services:
  bulk-api:
    build: .
    image: hospital-bulk-processing:latest
    container_name: hospital-bulk-processing
    ports:
      - "8000:8000"
    environment:
      UPSTREAM_BASE_URL: https://hospital-directory.onrender.com
      BULK_CONCURRENCY: "8"
      UPSTREAM_READ_TIMEOUT: "60"
      ACTIVATE_ON_PARTIAL: "false"
      LOG_LEVEL: INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
